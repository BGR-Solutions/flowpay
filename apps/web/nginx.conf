server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Encaminha as chamadas REST para o serviço da API (remove o prefixo /api).
  location /api/ {
    proxy_pass http://api:3333/;
    proxy_set_header Host $host;
  }

  # Encaminha o WebSocket de tempo real.
  location /ws {
    proxy_pass http://api:3333/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
